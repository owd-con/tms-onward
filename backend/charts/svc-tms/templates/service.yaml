apiVersion: v1
kind: Service
metadata:
  name: svc-tms-dev
  labels:
    app: svc-tms-dev
spec:
  type: {{ .Values.service.type }}
  selector:
    app: svc-tms-dev
  ports:
    - name: http
      port: {{ .Values.service.restPort }}
      targetPort: {{ .Values.containerPort }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.containerGRPCPort }}
