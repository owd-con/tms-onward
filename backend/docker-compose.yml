version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: onward-tms-postgres
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onward-tms-network

  redis:
    image: redis:7-alpine
    container_name: onward-tms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onward-tms-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: onward-tms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - onward-tms-network

  mongodb:
    image: mongo:7
    container_name: onward-tms-mongodb
    environment:
      MONGO_INITDB_DATABASE: tms_audit
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onward-tms-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  mongodb-data:

networks:
  onward-tms-network:
    driver: bridge
