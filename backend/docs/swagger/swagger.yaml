        type: string
      destination_city_id:
        type: string
      id:
        type: string
      origin_city_id:
        type: string
      price:
        type: number
    type: object
  profile.updateRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  rest.HTTPError:
    properties:
      code:
        type: integer
      message:
        $ref: '#/definitions/rest.Message'
    type: object
  rest.Message:
    enum:
    - success
    - resource created
    - resource updated
    - resource deleted
    - invalid request body
    - missing required fields
    - invalid field value
    - validation failed
    - unauthorized
    - forbidden
    - resource not found
    - conflict
    - internal server error
    - service unavailable
    - invalid request body. please check your input format
    - method not allowed
    type: string
    x-enum-varnames:
    - MsgSuccess
    - MsgCreated
    - MsgUpdated
    - MsgDeleted
    - MsgInvalidJSON
    - MsgMissingField
    - MsgInvalidField
    - MsgValidationError
    - MsgUnauthorized
    - MsgForbidden
    - MsgNotFound
    - MsgConflict
    - MsgInternalError
    - MsgServiceUnavailable
    - MsgBadRequest
    - MsgNotAllowed
  rest.Meta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  rest.ResponseBody:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/rest.Meta'
      success:
        type: boolean
    type: object
  trip.WaypointRequest:
