  /companies:
    get:
      consumes:
      - application/json
      description: Get current user's company (for non-admin) or list companies with
        filters (for admin)
      parameters:
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      - description: 'Filter by status: active or inactive (default: all)'
        in: query
        name: status
        type: string
      - description: Page number for pagination (admin only)
        in: query
        name: page
        type: integer
      - description: Items per page (admin only)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Get companies
      tags:
      - company
    put:
      consumes:
      - application/json
      description: Update company information
      parameters:
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      - description: Company data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/company.updateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Update company info
      tags:
      - company
  /companies/{id}/activate:
    put:
      consumes:
      - application/json
      description: Activate a company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Activate company
      tags:
      - company
  /companies/{id}/deactivate:
    put:
