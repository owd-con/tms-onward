host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: Transportation Management System API for logistics companies
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: TMS Onward API
  version: "1.0"
paths:
  /addresses:
    get:
      consumes:
      - application/json
      description: Get paginated list of addresses. Can filter by customer_id to get
        customer-specific addresses, or return all company addresses if not provided.
      parameters:
      - description: Customer ID to filter addresses by customer (optional - if not
          provided, returns all company addresses)
        in: query
        name: customer_id
        type: string
      - description: Filter by address name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by village ID
        in: query
        name: village_id
        type: string
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: List addresses
      tags:
      - address
    post:
      consumes:
      - application/json
      description: Create a new address. Can be associated with a specific customer
        (optional) or created as a company-level address.
      parameters:
      - description: Create address request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/address.createRequest'
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Create new address
      tags:
      - address
  /addresses/{id}:
    delete:
      consumes:
      - application/json
      description: Soft delete an address
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Delete address
      tags:
      - address
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific address
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Get address by ID
      tags:
      - address
    put:
      consumes:
      - application/json
      description: Update an existing address
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      - description: Update address request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/address.updateRequest'
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Update address
      tags:
      - address
  /addresses/{id}/activate:
    put:
      consumes:
      - application/json
      description: Activate an address
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: string
      - description: Bearer jwt-token...
        in: header
        name: authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.HTTPError'
      summary: Activate address
      tags:
      - address
  /addresses/{id}/deactivate:
    put:
      consumes:
