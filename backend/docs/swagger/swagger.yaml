  /auth/password:
    put:
      consumes:
      - application/json
      description: Change user password
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseBody'
      summary: Change Password
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register new company and admin user
      parameters:
      - description: Signup request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.signupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseBody'
        "400":
          description: Bad Request
          schema:
