syntax = "proto3";

package tms;
option go_package = "github.com/logistics-id/onward-tms/proto;proto";

import "google/protobuf/timestamp.proto";

// ============================================
// Auth Messages
// ============================================

// SignupRequest - Request for user registration
message SignupRequest {
  // Company data
  string company_name = 1;
  string company_type = 2; // 3PL or Carrier

  // User data
  string name = 3;
  string email = 4;
  string password = 5;
  string confirm_password = 6;
  string phone = 7;
}

// SignupResponse - Response after successful signup
message SignupResponse {
  string message = 1;
}

// FindCompanyByNameRequest - Request to find company by name
message FindCompanyByNameRequest {
  string name = 1;
}

// FindCompanyByNameResponse - Response with company exists status
message FindCompanyByNameResponse {
  bool exists = 1;
}

// FindUserByEmailRequest - Request to find user by email
message FindUserByEmailRequest {
  string email = 1;
}

// FindUserByEmailResponse - Response with user exists status
message FindUserByEmailResponse {
  bool exists = 1;
}

// ============================================
// Dashboard Messages
// ============================================

// DashboardSummary - Summary statistics for superadmin
message DashboardSummary {
  int64 total_tenants = 1;
  int64 total_shipments = 2;
}

// CompanyData - Company shipment data
message CompanyData {
  string company_name = 1;
  int64 total_shipments = 2;
  google.protobuf.Timestamp created_at = 3;
}

// DashboardRequest - Request with optional month filter
message DashboardRequest {
  // Optional month filter in format "YYYY-MM" (e.g., "2025-03")
  // If empty, returns all-time statistics
  string monthly = 1;
}

// DashboardResponse - Response with summary data
message DashboardResponse {
  DashboardSummary summary = 1;
  repeated CompanyData companies = 2;
}

// ============================================
// TMS Service - All gRPC operations
// ============================================

service TMSService {
  // Auth operations
  rpc Signup(SignupRequest) returns (SignupResponse);
  rpc FindCompanyByName(FindCompanyByNameRequest) returns (FindCompanyByNameResponse);
  rpc FindUserByEmail(FindUserByEmailRequest) returns (FindUserByEmailResponse);

  // Dashboard operations
  rpc GetDashboard(DashboardRequest) returns (DashboardResponse);
}
