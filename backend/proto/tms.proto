syntax = "proto3";

package tms;
option go_package = "github.com/logistics-id/onward-tms/proto;proto";

import "google/protobuf/timestamp.proto";

// ============================================
// Dashboard Messages
// ============================================

// DashboardSummary - Summary statistics for superadmin
message DashboardSummary {
  int64 total_tenants = 1;
  int64 total_shipments = 2;
}

// CompanyData - Company shipment data
message CompanyData {
  string company_name = 1;
  int64 total_shipments = 2;
  google.protobuf.Timestamp created_at = 3;
}

// DashboardRequest - Request with optional month filter
message DashboardRequest {
  // Optional month filter in format "YYYY-MM" (e.g., "2025-03")
  // If empty, returns all-time statistics
  string monthly = 1;
}

// DashboardResponse - Response with summary data
message DashboardResponse {
  DashboardSummary summary = 1;
  repeated CompanyData companies = 2;
}

// ============================================
// TMS Service - All gRPC operations
// ============================================

service TMSService {
  // Dashboard operations
  rpc GetDashboard(DashboardRequest) returns (DashboardResponse);
}
